<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="uzaylogo.ico">
<title>Space Maze</title>
<style>
html, body { margin: 0; padding: 0; font-family: 'Orbitron', sans-serif; background: url(images/ky.png) center/cover no-repeat fixed; overflow-x: hidden; }
#wrapper { width: 90%; margin: auto; text-align: center; }
#heading { font-size: 2em; margin: 10px auto; padding: 10px; width: 40%; background: linear-gradient(90deg,blue,#6600ff); color: #fff; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.4); }
#instruction { color:#41d9f4; font-size:1.2em; margin-bottom:10px; text-shadow: 0 0 5px #000; }
#canvas { display: block; margin: 15px auto; border: 3px solid #fff; border-radius: 10px; background: rgba(0,0,0,0.6); }
#c, #timerel { display: block; margin: 10px auto; font-size: 1.2em; color: #fff; text-shadow: 0 0 5px #000; }
.modal { display: none; position: fixed; z-index: 1; padding-top: 20%; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); }
.modal-content { background-color: #222; margin: auto; padding: 0; width: 30%; border-radius: 12px; animation: animatetop 0.4s; color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
@keyframes animatetop { from { top: -300px; opacity: 0; } to { top: 0; opacity: 1; } }
.close { color: blue; float: right; font-size: 28px; font-weight: bold; cursor: pointer; margin-right: 10px; }
.close:hover { color: #41d9f4; }
.modal-header { padding: 10px 16px; background: linear-gradient(90deg,#6600ff,#000e44); border-radius: 12px 12px 0 0; }
.modal-header h2 { margin: 0; }
.modal-footer { padding: 10px 16px; background: linear-gradient(90deg,#000e44,#6600ff); border-radius: 0 0 12px 12px; }
.modal-footer h2 { cursor: pointer; margin: 0; transition: 0.3s; }
.modal-footer h2:hover { color: #41d9f4; transform: scale(1.1); }
#startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,20,0.9); display: flex; justify-content: center; align-items: center; z-index: 999; }
#startButton { font-size: 3em; padding: 20px 60px; background: linear-gradient(90deg,blue,#6600ff); border: none; color: white; border-radius: 15px; cursor: pointer; box-shadow: 0 0 30px #6600ff; transition: 0.3s; }
#startButton:hover { transform: scale(1.1); box-shadow: 0 0 60px #41d9f4; }
</style>
</head>
<body>
<div id="startOverlay"><button id="startButton">Start Game</button></div>
<section>
<div id="wrapper">
<h1 id="heading">Space Maze</h1>
<p id="instruction">Complete the Maze in 15 Seconds!</p>
<div id="c"></div>
<canvas id="canvas" width="523" height="523"></canvas>
<div id="timerel"></div>
<div id="myModal" class="modal">
<div class="modal-content">
  <div class="modal-header">
    <span class="close">&times;</span>
    <h2 class="gamehead"></h2>
  </div>
  <div class="modal-footer">
    <h2 id="demo">Play Again?</h2>
  </div>
</div>
</div>
<audio id="bgmusic" src="space.mp3" loop></audio>
</div>
<script>
var modal=document.getElementById('myModal');
var span=document.getElementsByClassName("close")[0];
var playing=false;
function modelfungo(){modal.style.display="block"; document.querySelector(".gamehead").textContent="Game Over";}
function modelfunwin(){modal.style.display="block"; document.querySelector(".gamehead").textContent="Congrats! You Win";}
document.getElementById("demo").addEventListener("click",function(){document.location.reload();});
span.onclick=function(){modal.style.display="none";}
window.onclick=function(event){if(event.target==modal) modal.style.display="none";}
function startTimer(duration,display){
  var start=Date.now();
  function timer(){
    if(playing){
      var diff=duration-(((Date.now()-start)/1000)|0);
      var minutes=(diff/60)|0;
      var seconds=(diff%60)|0;
      minutes=minutes<10?"0"+minutes:minutes;
      seconds=seconds<10?"0"+seconds:seconds;
      display.textContent="Game ends in "+minutes+":"+seconds;
      if(diff<=0){display.textContent="Game Over"; playing=false; modelfungo();}
    }
  }
  timer();
  setInterval(timer,1000);
}
function initializeGame(){
  m=new maze(10,10); m.init(); m.add_edges(); m.gen_maze(); m.draw_canvas("canvas");
  setInterval(drawMoves,100);
  startTimer(14,document.querySelector("#timerel"));
  document.getElementById("bgmusic").play();
}
window.addEventListener('keydown',doKeyDown,true);
function doKeyDown(evt){
  var handled=false;
  if(playing){
    switch(evt.keyCode){
      case 38: case 87: m.moveup("canvas"); handled=true; break;
      case 40: case 83: m.movedown("canvas"); handled=true; break;
      case 37: case 65: m.moveleft("canvas"); handled=true; break;
      case 39: case 68: m.moveright("canvas"); handled=true; break;
    }
    if(m.checker("canvas")) playing=false;
  }
  if(handled) evt.preventDefault();
}
var dsd=function(size){this.N=size; this.P=new Array(this.N); this.R=new Array(this.N);
this.init=function(){for(var i=0;i<this.N;i++){this.P[i]=i; this.R[i]=0;}}
this.union=function(x,y){var u=this.find(x); var v=this.find(y); if(this.R[u]>this.R[v]){this.R[u]=this.R[v]+1; this.P[u]=v;} else{this.R[v]=this.R[u]+1; this.P[v]=u;}}
this.find=function(x){if(x==this.P[x]) return x; this.P[x]=this.find(this.P[x]); return this.P[x];}};
function random(min,max){return min+Math.random()*(max-min);}
function randomChoice(choices){return choices[Math.round(random(0,choices.length-1))];}
var maze=function(X,Y){
  this.N=X; this.M=Y; this.S=25; this.moves=0;
  this.Board=new Array(2*this.N+1); this.EL=new Array(); this.vis=new Array(2*this.N+1);
  this.init=function(){for(var i=0;i<2*this.N+1;i++){this.Board[i]=new Array(2*this.M+1); this.vis[i]=new Array(2*this.M+1);}
    for(var i=0;i<2*this.N+1;i++){for(var j=0;j<2*this.M+1;j++){
      if(!(i%2)&&!(j%2)) this.Board[i][j]='+'; else if(!(i%2)) this.Board[i][j]='-'; else if(!(j%2)) this.Board[i][j]='|'; else this.Board[i][j]=' ';
      this.vis[i][j]=0;
    }}
  }
  this.add_edges=function(){for(var i=0;i<this.N;i++){for(var j=0;j<this.M;j++){if(i!=this.N-1)this.EL.push([[i,j],[i+1,j],1]); if(j!=this.M-1)this.EL.push([[i,j],[i,j+1],1]);}}}
  this.h=function(e){return e[1]*this.M+e[0];}
  this.randomize=function(EL){for(var i=0;i<EL.length;i++){var si=Math.floor(Math.random()*387)%EL.length; var tmp=EL[si]; EL[si]=EL[i]; EL[i]=tmp;} return EL;}
  this.breakwall=function(e){var x=e[0][0]+e[1][0]+1; var y=e[0][1]+e[1][1]+1; this.Board[x][y]=' ';}
  this.gen_maze=function(){this.EL=this.randomize(this.EL); var D=new dsd(this.M*this.M); D.init(); var s=this.h([0,0]); var e=this.h([this.N-1,this.M-1]); this.Board[1][0]=' '; this.Board[2*this.N-1][2*this.M]=' '; for(var i=0;i<this.EL.length;i++){var x=this.h(this.EL[i][0]); var y=this.h(this.EL[i][1]); if(D.find(s)==D.find(e)){if(!(D.find(x)==D.find(s)&&D.find(y)==D.find(s))){if(D.find(x)!=D.find(y)){D.union(x,y); this.breakwall(this.EL[i]); this.EL[i][2]=0;}}} else if(D.find(x)!=D.find(y)){D.union(x,y); this.breakwall(this.EL[i]); this.EL[i][2]=0;}}}
  this.draw_canvas=function(id){
    this.canvas=document.getElementById(id);
    var scale=this.S; temp=[];
    if(this.canvas.getContext){
      this.ctx=this.canvas.getContext('2d'); 
      this.Board[1][0]='$';
      for(var i=0;i<2*this.N+1;i++){
        for(var j=0;j<2*this.M+1;j++){
          if(this.Board[i][j]!=' '){this.ctx.fillStyle="#6600ff"; this.ctx.fillRect(scale*i, scale*j, scale, scale);}
          else if(i<5&&j<5) temp.push([i,j]);
        }
      } 
      x=randomChoice(temp); 
      this.Board[x[0]][x[1]]='&'; 
      this.ctx.fillStyle="#000e44"; 
      this.ctx.shadowColor = "blue";
      this.ctx.shadowBlur = 15;
      this.ctx.fillRect(scale*x[0], scale*x[1], scale, scale);
      this.ctx.shadowBlur = 0;
    }
  };
  this.checkPos=function(id){for(var i=0;i<2*this.N+1;i++){for(var j=0;j<2*this.M+1;j++){if(this.Board[i][j]=='&') return [i,j];}}}
  this.moveclear=function(a,b){var scale=this.S; this.ctx.fillStyle="blue"; this.ctx.fillRect(scale*a, scale*b, scale, scale); this.Board[a][b]=' ';}
  this.move=function(a,b){var scale=this.S; this.ctx.fillStyle="#000e44"; this.ctx.shadowColor = "blue"; this.ctx.shadowBlur = 15; this.ctx.fillRect(scale*a, scale*b, scale, scale); this.Board[a][b]='&'; this.ctx.shadowBlur=0;}
  this.moveup=function(id){cord=this.checkPos(id); i=cord[0]; j=cord[1]-1; if(j<0||j>2*this.M||this.Board[i][j]!=' ') return; this.moveclear(i,j+1); this.move(i,j); this.moves+=1;}
  this.movedown=function(id){cord=this.checkPos(id); i=cord[0]; j=cord[1]+1; if(j<0||j>2*this.M||this.Board[i][j]!=' ') return; this.moveclear(i,j-1); this.move(i,j); this.moves+=1;}
  this.moveleft=function(id){cord=this.checkPos(id); i=cord[0]-1; j=cord[1]; if(i<0||i>2*this.N||this.Board[i][j]!=' ') return; this.moveclear(i+1,j); this.move(i,j); this.moves+=1;}
  this.moveright=function(id){cord=this.checkPos(id); i=cord[0]+1; j=cord[1]; if(i<0||i>2*this.N||this.Board[i][j]!=' ') return; this.moveclear(i-1,j); this.move(i,j); this.moves+=1;}
  this.checker=function(id){cord=this.checkPos(id); i=cord[0]; j=cord[1]; if((i==19&&j==20)||(i==1&&j==0)){modelfunwin(); return 1;} return 0;}
  this.getMoves=function(){return this.moves;}
};
function drawMoves(){document.getElementById("c").textContent="Moves: "+m.getMoves();}
document.getElementById("startButton").addEventListener("click",function(){
  document.getElementById("startOverlay").style.display="none";
  playing=true;
  initializeGame();
});
</script>
</section>
</body>
</html>
