<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="shortcut icon" href="https://www.uzay.info/uzaylogo.ico">
<title>Star Simulation</title>
<style>
  :root{--panel:rgba(10,14,30,0.7);--glass:rgba(255,255,255,0.03)}
  html,body{height:100%;margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background: linear-gradient(180deg, rgb(0,0,10) 0%, rgb(5,5,30) 40%, rgb(10,10,50) 70%, rgb(0,0,0) 100%);color:#dfefff;overflow:hidden}
  #sky{position:absolute;top:0;left:0;height:100%;background:#000;z-index:0}
  .panel{position:fixed;top:18px;right:18px;width:340px;background:var(--panel);border-radius:12px;padding:14px;box-shadow:0 8px 24px rgba(2,6,20,0.6);backdrop-filter:blur(6px);overflow:auto;max-height:calc(100vh - 36px);z-index:10}
  .star-list{display:grid;gap:8px}
  .star-item{display:flex;gap:10px;align-items:center;padding:8px;border-radius:8px;background:var(--glass);cursor:pointer}
  .swatch{width:40px;height:40px;border-radius:50%;box-shadow:0 4px 10px rgba(0,0,0,0.6);flex:0 0 40px;display:flex;align-items:center;justify-content:center;font-size:12px}
  .meta{font-size:13px;color:#cfe9ff}
  .meta small{color:#9eb8d8;display:block;font-size:11px}
  .info{margin-top:12px}
  .info h3{margin:6px 0}
  .badge{display:inline-block;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,0.04);font-size:12px;margin-right:6px}
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="panel" id="side">
  <div class="star-list" id="starList"></div>
  <div class="info" id="infoCard">
    <h3>Selected Star: <span id="sname">(click)</span></h3>
    <div class="meta" id="smeta">No star selected.</div>
    <div style="margin-top:10px">
      <span class="badge">Size ~ scale</span>
      <span class="badge">Color ~ surface temperature</span>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let DPR = Math.max(1, window.devicePixelRatio || 1);
let W = 0, H = 0;
const starData = [
  {id:'uy', name:'UY Scuti', sizeScale:1700, tempK:3500, age:'~10 million years', note:'Red supergiant, very large radius.'},
  {id:'eblm', name:'EBLM J0555-57Ab', sizeScale:0.08, tempK:2800, age:'Main sequence, very low mass', note:'One of the smallest known stars by mass.'},
  {id:'hd', name:'HD 140283 (Methuselah)', sizeScale:1.2, tempK:5770, age:'~14 billion years', note:'Ancient star from the early universe.'},
  {id:'iras', name:'IRAS 16293-2422', sizeScale:0.6, tempK:3000, age:'Protostar (very young)', note:'Still in formation stage.'},
  {id:'wise', name:'WISE 1828+2650', sizeScale:0.1, tempK:300, age:'Brown dwarf, very cold', note:'Extremely low surface temperature.'},
  {id:'trappist', name:'TRAPPIST-1', sizeScale:0.12, tempK:2550, age:'~7.6 billion years', note:'Cool red dwarf, famous for its planetary system.'},
  {id:'wr', name:'WR 102', sizeScale:35, tempK:210000, age:'Short-lived, very hot', note:'Wolf–Rayet type, extremely high temperature.'}
];
let stars = [];
const starListEl = document.getElementById('starList');
const sname = document.getElementById('sname');
const smeta = document.getElementById('smeta');
function resize(){
  DPR = Math.max(1, window.devicePixelRatio || 1);
  const panelWidth = 340 + 36;
  W = window.innerWidth - panelWidth;
  H = window.innerHeight;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  layoutStars();
}
function sizeToRadius(scale){
  const minPx = 4;
  const maxPx = 90;
  const logScale = Math.log10(Math.max(0.01,scale)+1);
  return minPx + (maxPx - minPx) * (logScale / Math.log10(2100));
}
function temperatureToHSL(k){
  if(k<1000) return 'rgb(80,50,150)';
  if(k<3000) return 'rgb(255,50,50)';
  if(k<4000) return 'rgb(255,100,50)';
  if(k<5000) return 'rgb(255,200,150)';
  if(k<6000) return 'rgb(255,255,200)';
  if(k<10000) return 'rgb(200,220,255)';
  if(k<50000) return 'rgb(150,200,255)';
  return 'rgb(100,150,255)';
}
function initStars(){
  stars = starData.map((s) => {
    return {
      id: s.id,
      name: s.name,
      sizeScale: s.sizeScale,
      tempK: s.tempK,
      age: s.age,
      note: s.note,
      radius: sizeToRadius(s.sizeScale),
      color: temperatureToHSL(s.tempK),
      baseAlpha: 0.6 + Math.random() * 0.35,
      twSpeed: 0.6 + Math.random() * 1.6,
      cx: 0.5,
      cy: 0.5,
      bobAmp: 3 + Math.random() * 6
    };
  });
  layoutStars();
  renderList();
  selectStar(stars[0].id);
}
function layoutStars(){
  if(!stars || stars.length === 0) return;
  const margin = 0.06;
  const n = stars.length;
  for(let i=0;i<n;i++){
    const t = n === 1 ? 0.5 : margin + (i) * (1 - 2 * margin) / (n - 1);
    stars[i].cx = t;
    stars[i].cy = 0.5;
  }
}
function draw(now){
  const t = now / 1000;
  ctx.clearRect(0,0,W,H);
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, 'rgb(0,0,10)');
  bg.addColorStop(0.4, 'rgb(5,5,30)');
  bg.addColorStop(0.7, 'rgb(10,10,50)');
  bg.addColorStop(1, 'rgb(0,0,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);
  for(const s of stars){
    const x = s.cx * W;
    const y = s.cy * H + Math.sin(t * 0.6 + s.cx * 6) * s.bobAmp;
    const tw = 0.75 + 0.25 * Math.sin(t * s.twSpeed + s.cx * 12);
    const alpha = Math.max(0.2, Math.min(1, s.baseAlpha * tw));
    const grd = ctx.createRadialGradient(x, y, 0, x, y, s.radius * 3);
    grd.addColorStop(0, s.color.replace('rgb','rgba').replace(')', ',' + alpha.toFixed(3) + ')'));
    grd.addColorStop(0.45, s.color.replace('rgb','rgba').replace(')', ',' + (alpha * 0.45).toFixed(3) + ')'));
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.fillStyle = grd;
    ctx.arc(x, y, s.radius * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.fillStyle = s.color.replace('rgb','rgba').replace(')', ',' + Math.min(1, alpha + 0.18).toFixed(3) + ')');
    ctx.arc(x, y, Math.max(1.4, s.radius * 0.9), 0, Math.PI * 2);
    ctx.fill();
  }
  requestAnimationFrame(draw);
}
function renderList(){
  starListEl.innerHTML = '';
  for(const s of stars){
    const el = document.createElement('div');
    el.className = 'star-item';
    el.dataset.id = s.id;
    el.innerHTML = `<div class="swatch" style="background:${s.color}"></div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <strong style="font-size:14px">${s.name}</strong>
          <small style="color:#9fb7d8">${Math.round(s.sizeScale * 100) / 100}×</small>
        </div>
        <div class="meta"><small>${s.note}</small></div>
      </div>`;
    el.addEventListener('click', () => selectStar(s.id));
    starListEl.appendChild(el);
  }
}
let selectedId = null;
function selectStar(id){
  selectedId = id;
  const s = stars.find(x => x.id === id);
  if(!s) return;
  sname.textContent = s.name;
  smeta.innerHTML = `<div><strong>Size (scale):</strong> ${s.sizeScale} × Sun</div>
    <div><strong>Visual radius (px):</strong> ${Math.round(s.radius)}</div>
    <div><strong>Temperature:</strong> ${s.tempK} K</div>
    <div><strong>Age / type:</strong> ${s.age}</div>
    <div style="margin-top:6px"><em>${s.note}</em></div>`;
}
window.addEventListener('resize', resize);
initStars();
resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
