<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="shortcut icon" href="https://www.uzay.info/uzaylogo.ico">
  <title>Deep Space Simulation Launcher</title>
  <style>
    :root {
      --bg1: #010014;
      --bg2: #030726;
      --accent1: #7b61ff;
      --accent2: #ff6a88;
      --text: #e6eef8;
    }
    html,body {
      height: 100%;
      margin: 0;
      font-family: Inter, system-ui, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at 20% 20%, var(--bg2) 0%, var(--bg1) 80%);
      color: var(--text);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.02);
      padding: 60px 40px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0,0,0,0.7);
    }
    h1 {
      font-size: 28px;
      margin-bottom: 40px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .btn {
      display: block;
      width: 280px;
      margin: 14px auto;
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      cursor: pointer;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      color: #fff;
      transition: all 0.25s ease;
      letter-spacing: 0.5px;
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 18px rgba(255,255,255,0.15);
    }
    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #9fb0d6;
      opacity: 0.7;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="container">
    <h1>Deep Space Simulation</h1>
    <button class="btn" onclick="startSim('lateral')">Start Lateral Deep Space Simulation</button>
    <button class="btn" onclick="startSim('frontal')">Start Frontal Deep Space Simulation</button>
    <div class="footer">Select a mode to begin your journey through the cosmos.</div>
  </div>
  <script>
    function startSim(type){
      if(type==='lateral') window.location.href='deepspace/lateral';
      if(type==='frontal') window.location.href='deepspace/frontal';
    }
    const c=document.getElementById('bg'),x=c.getContext('2d');
    let w=innerWidth,h=innerHeight;
    c.width=w;c.height=h;
    let stars=Array.from({length:200},()=>({x:Math.random()*w,y:Math.random()*h,s:Math.random()*2}));
    function draw(){
      x.fillStyle='rgba(0,0,20,0.4)';
      x.fillRect(0,0,w,h);
      x.fillStyle='white';
      for(const s of stars){
        x.globalAlpha=Math.random()*0.7+0.3;
        x.fillRect(s.x,s.y,s.s,s.s);
      }
      requestAnimationFrame(draw);
    }
    draw();
    window.addEventListener('resize',()=>{w=innerWidth;h=innerHeight;c.width=w;c.height=h});
  </script>
</body>
</html>
