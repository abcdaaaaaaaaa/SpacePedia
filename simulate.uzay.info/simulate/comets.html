<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="shortcut icon" href="https://www.uzay.info/uzaylogo.ico">
<title>Comet Simulation</title>
<style>
:root { --panel: rgba(10,14,30,0.7); --glass: rgba(255,255,255,0.03); }
html, body { height: 100%; margin: 0; font-family: Inter,Segoe UI,Arial,sans-serif; background: linear-gradient(180deg, rgb(0,0,10) 0%, rgb(5,5,30) 40%, rgb(10,10,50) 70%, rgb(0,0,0) 100%); color: #dfefff; overflow: hidden; }
#space { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
.panel { position: fixed; top: 18px; right: 18px; width: 340px; background: var(--panel); border-radius: 12px; padding: 14px; box-shadow: 0 8px 24px rgba(2,6,20,0.6); backdrop-filter: blur(6px); overflow: auto; max-height: calc(100vh - 36px); z-index: 10; }
.comet-list { display: grid; gap: 8px; }
.comet-item { display: flex; gap: 10px; align-items: center; padding: 8px; border-radius: 8px; background: var(--glass); cursor: pointer; }
.swatch { width: 40px; height: 40px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.6); flex: 0 0 40px; }
.meta { font-size: 13px; color: #cfe9ff; }
.meta small { color: #9eb8d8; display: block; font-size: 11px; }
.info { margin-top: 12px; }
.info h3 { margin: 6px 0; }
.badge { display: inline-block; padding: 4px 8px; border-radius: 999px; background: rgba(255,255,255,0.04); font-size: 12px; margin-right: 6px; }
</style>
</head>
<body>
<canvas id="space"></canvas>
<div class="panel" id="side">
  <div class="comet-list" id="cometList"></div>
  <div class="info" id="infoCard">
    <h3>Selected Comet: <span id="cname">(click)</span></h3>
    <div class="meta" id="cmeta">No comet selected.</div>
    <div style="margin-top:10px">
      <span class="badge">Tail ~ Dust/Ion Stream</span>
      <span class="badge">Color ~ Composition</span>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');
let DPR = Math.max(1, window.devicePixelRatio || 1);
let W = 0, H = 0;
const cometData = [
  {id:'halley', name:'Halley', color:'rgba(150,200,255,1)', tail:'Ion + Dust', speed:1.2, period:'~75 years', note:'Famous periodic comet visible from Earth since 240 BC. It has been studied for centuries and has a bright ion tail and dust trail that can be seen with the naked eye. Astronomers track its orbit carefully due to its regular appearances. Halley’s comet has influenced astronomy and culture throughout history.'},
  {id:'hale', name:'Hale-Bopp', color:'rgba(120,180,255,1)', tail:'Bright dual tail', speed:0.6, period:'~2530 years', note:'Hale-Bopp was extremely bright and visible to the naked eye for 18 months in 1997. It has two distinct tails, a dust tail and an ion tail, making it spectacular to observe. The comet’s passage allowed astronomers to study cometary composition in detail. It remains one of the most famous comets of the modern era.'},
  {id:'neowise', name:'NEOWISE', color:'rgba(180,255,220,1)', tail:'Dust-rich', speed:1.0, period:'~6800 years', note:'NEOWISE appeared in 2020 and became one of the brightest comets of the 21st century. Its dust-rich tail created beautiful views in the night sky. Observations helped scientists understand the structure and composition of long-period comets. NEOWISE’s passage offered a rare chance to see a bright comet with binoculars or the naked eye.'},
  {id:'encke', name:'Encke', color:'rgba(255,240,200,1)', tail:'Short Ion tail', speed:1.8, period:'3.3 years', note:'Encke has the shortest known orbital period among bright comets, completing its orbit every 3.3 years. Its ion tail is short but noticeable, especially when close to the Sun. Encke’s comet has been historically significant for studying cometary evolution. Frequent observations allow detailed tracking of its path and behavior.'},
  {id:'hyakutake', name:'Hyakutake', color:'rgba(180,230,255,1)', tail:'Long gas tail', speed:0.9, period:'~17000 years', note:'Hyakutake passed extremely close to Earth in 1996, providing a spectacular view. Its long gas tail stretched across the sky and was a highlight for astronomers and sky watchers. The comet’s close approach allowed scientists to study its composition extensively. Hyakutake remains an iconic comet for modern observers.'},
  {id:'tempel', name:'Tempel-Tuttle', color:'rgba(200,200,255,1)', tail:'Meteor shower source', speed:1.3, period:'~33 years', note:'Tempel-Tuttle is the parent body of the Leonid meteor shower. Its orbit intersects Earth’s path, creating spectacular meteor showers annually. The comet itself is less visible but scientifically important. Observations of Tempel-Tuttle help understand the connection between comets and meteor showers.'},
  {id:'67p', name:'67P/Churyumov–Gerasimenko', color:'rgba(180,180,220,1)', tail:'Dust jets', speed:1.1, period:'~6.4 years', note:'67P was visited by ESA’s Rosetta spacecraft in 2014. The comet has active dust jets and a complex shape, offering detailed insights into cometary behavior. Its study provided valuable data on comet composition and activity. 67P continues to be an important object for scientific research.'}
];
let comets = [];
const cometListEl = document.getElementById('cometList');
const cname = document.getElementById('cname');
const cmeta = document.getElementById('cmeta');
function resize(){
  DPR = Math.max(1, window.devicePixelRatio || 1);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
function initComets(){
  const centerY = H/2;
  comets = cometData.map((c,i)=>({ ...c, x: 60 + i*120, y: centerY, tailParticles:[] }));
  renderList();
  selectComet(comets[0].id);
}
function draw(now){
  ctx.fillStyle = "rgba(0,0,10,0.25)";
  ctx.fillRect(0,0,W,H);
  for(const c of comets){
    c.tailParticles.unshift({x:c.x, y:c.y, alpha:1});
    if(c.tailParticles.length>60) c.tailParticles.pop();
    for(let i=0;i<c.tailParticles.length;i++){
      const p = c.tailParticles[i];
      p.alpha -= 0.015;
      const offset = Math.sin(now/1200 + i*0.05)*5;
      ctx.beginPath();
      ctx.fillStyle = c.color.replace('1)', (p.alpha*0.4)+')');
      ctx.arc(p.x + offset, p.y - i*0.5, Math.max(0.5,3-i*0.05), 0, Math.PI*2);
      ctx.fill();
    }
    const grd = ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,10);
    grd.addColorStop(0,c.color);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.fillStyle = grd;
    ctx.arc(c.x,c.y,8,0,Math.PI*2);
    ctx.fill();
  }
  requestAnimationFrame(draw);
}
function renderList(){
  cometListEl.innerHTML='';
  for(const c of comets){
    const el=document.createElement('div');
    el.className='comet-item';
    el.dataset.id=c.id;
    el.innerHTML=`<div class="swatch" style="background:${c.color}"></div>
      <div style="flex:1">
        <strong style="font-size:14px">${c.name}</strong>
        <div class="meta"><small>${c.note.split('. ')[0]}.</small></div>
      </div>`;
    el.addEventListener('click',()=>selectComet(c.id));
    cometListEl.appendChild(el);
  }
}
function selectComet(id){
  const c=comets.find(x=>x.id===id);
  if(!c) return;
  cname.textContent=c.name;
  cmeta.innerHTML = `
    <div><strong>Speed:</strong> ${c.speed}</div>
    <div><strong>Tail:</strong> ${c.tail}</div>
    <div><strong>Orbital Period:</strong> ${c.period}</div>
    <div style="margin-top:6px"><em>${c.note}</em></div>
  `;
}
window.addEventListener('resize', resize);
resize();
initComets();
requestAnimationFrame(draw);
</script>
</body>
</html>
